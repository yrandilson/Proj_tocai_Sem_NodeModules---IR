name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:

  # ─── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend (lint + test + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: back/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Verificar tipos (tsc)
        run: npx tsc --noEmit

      - name: Rodar testes
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_secret_de_pelo_menos_32_chars_aqui
          REFRESH_TOKEN_SECRET: ci_refresh_secret_de_pelo_menos_32_chars_aqui
          DB_TYPE: sqlite
          DB_DATABASE: ":memory:"
        run: npm test -- --forceExit

      - name: Build de produção
        run: npm run build

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: front/src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/src/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Build de produção
        run: npm run build

  # ─── Docker Build ──────────────────────────────────────────────────────────
  docker:
    name: Docker build (sem push)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build imagem backend
        run: docker build -t trocaai-backend:ci ./back

      - name: Build imagem frontend
        run: docker build -t trocaai-frontend:ci ./front
